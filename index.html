  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #0F1117; color: #E8E8E8; min-height: 100vh; padding-bottom: 90px; }

    /* HEADER */
    header { background: #161B22; padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px #00000066; }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    h1 { font-size: 24px; font-weight: 900; color: #fff; }
    .subtitle { font-size: 11px; color: #666; margin-top: 1px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge.online { background: #51CF6622; color: #51CF66; }
    .badge.syncing { background: #FFD43B22; color: #FFD43B; }
    .stats-row { display: flex; gap: 20px; margin-bottom: 12px; }
    .stat { display: flex; flex-direction: column; align-items: center; }
    .stat-num { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }
    .stat-num.red { color: #FF6B6B; }
    .stat-num.yellow { color: #FFD43B; }
    .stat-num.green { color: #51CF66; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; }
    nav { display: flex; gap: 4px; }
    .nav-btn { flex: 1; padding: 10px 4px; background: transparent; border: none; border-bottom: 3px solid transparent; color: #666; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .nav-btn.active { color: #51CF66; border-bottom-color: #51CF66; }

    /* MAIN */
    main { padding: 16px; }
    .tool-row { margin-bottom: 12px; }
    .search-input { width: 100%; padding: 10px 14px; background: #1E2330; border: 1px solid #2A3040; border-radius: 12px; color: #E8E8E8; font-size: 14px; outline: none; margin-bottom: 8px; font-family: inherit; }
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 12px; background: #1E2330; border: 1px solid #2A3040; border-radius: 20px; color: #888; font-size: 12px; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: #51CF6622; border-color: #51CF66; color: #51CF66; }
    .clear-btn { padding: 6px 12px; background: #FF6B6B22; border: 1px solid #FF6B6B44; border-radius: 20px; color: #FF6B6B; font-size: 12px; cursor: pointer; margin-left: auto; font-family: inherit; }
    .section-hint { font-size: 12px; color: #555; margin-bottom: 12px; }

    /* CAT SECTIONS */
    .cat-section { margin-bottom: 20px; }

      <label class="form-label">Categoria</label>
      <div class="cat-picker" id="cat-picker"></div>
      <label class="form-label">Quantidade em casa</label>
      <div class="row-2">
        <div>
          <input class="form-input" id="f-qty" type="number" min="0" value="${item ? (item.qty || 0) : 0}" />
        </div>
        <div>
          <select class="form-input" id="f-unit">
            <option ${item?.unit==='un'?'selected':''}>un</option>
            <option ${item?.unit==='kg'?'selected':''}>kg</option>
            <option ${item?.unit==='g'?'selected':''}>g</option>
            <option ${item?.unit==='L'?'selected':''}>L</option>
            <option ${item?.unit==='ml'?'selected':''}>ml</option>
            <option ${item?.unit==='cx'?'selected':''}>cx</option>
            <option ${item?.unit==='pct'?'selected':''}>pct</option>
            <option ${item?.unit==='frasco'?'selected':''}>frasco</option>
          </select>
        </div>
      </div>
      <label class="form-label">Nível do estoque</label>
      <div class="level-picker" id="level-picker"></div>
      <label class="form-label">Observações</label>
      <textarea class="form-input" id="f-notes" placeholder="Marca preferida, tamanho..." style="min-height:60px;resize:vertical">${item ? (item.notes || '') : ''}</textarea>
      <button class="save-btn" onclick="saveStockForm()">${id ? '💾 Salvar alterações' : '✅ Adicionar ao estoque'}</button>
    `;
    renderCatPicker(); renderLevelPicker();
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-name').focus(), 100);
  };

  window.saveStockForm = async () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('Digite o nome do produto!'); return; }
    setSyncing(true);
    const data = {
      name, category: formCat, level: formLevel,
      qty: Number(document.getElementById('f-qty').value) || 0,
      unit: document.getElementById('f-unit').value,
      notes: document.getElementById('f-notes').value.trim(),
      updatedAt: Date.now(),
    };
    if (editId) {
      await update(ref(db,'stock/'+editId), data);
      showToast('Produto atualizado!');
    } else {
      data.createdAt = Date.now();
      await push(stockRef, data);
      showToast('Produto adicionado ao estoque! 📦');
    }
    setSyncing(false); closeForm();
  };

  window.cycleLevel = async (id) => {
    const order = ['full','ok','low','out'];
    const item = stockItems[id];
    const idx = order.indexOf(item.level || 'ok');
    const next = order[(idx+1) % order.length];
    setSyncing(true);
    await update(ref(db,'stock/'+id), { level: next, updatedAt: Date.now() });
    setSyncing(false);
  };

  window.sendToList = async (id) => {
    const item = stockItems[id];
    setSyncing(true);
    const data = {
      name: item.name, category: item.category,
      quantity: 1, unit: item.unit || 'un',
      notes: '', urgent: false, done: false,
      fromStock: true, stockId: id,
      createdAt: Date.now(), updatedAt: Date.now(),
    };
    await push(listRef, data);
    setSyncing(false);
    showToast(`"${item.name}" adicionado à lista! 🛒`);
  };

  window.deleteStock = async (id) => {
    setSyncing(true);
    await remove(ref(db,'stock/'+id));
    setSyncing(false); showToast('Produto removido do estoque');
  };

  // ── LIST ACTIONS ──────────────────────────────────────────
  window.openListForm = (id) => {
    editId = id; editMode = 'list';
    const item = id ? listItems[id] : null;
    formCat = item ? item.category : (activeCategory || 'especificos');
    document.getElementById('modal-title').textContent = id ? 'Editar item' : 'Novo item na lista';
    document.getElementById('form-body').innerHTML = `
      <label class="form-label">Nome do item *</label>
      <input class="form-input" id="f-name" placeholder="Ex: Arroz, Shampoo..." value="${item ? item.name : ''}" />
      <label class="form-label">Categoria</label>
      <div class="cat-picker" id="cat-picker"></div>
      <div class="row-2">
        <div>
          <label class="form-label">Quantidade</label>
          <input class="form-input" id="f-qty" type="number" min="1" value="${item ? (item.quantity||1) : 1}" />
        </div>
        <div>
          <label class="form-label">Unidade</label>
          <select class="form-input" id="f-unit">
            <option ${item?.unit==='un'?'selected':''}>un</option>
            <option ${item?.unit==='kg'?'selected':''}>kg</option>
            <option ${item?.unit==='g'?'selected':''}>g</option>
            <option ${item?.unit==='L'?'selected':''}>L</option>
            <option ${item?.unit==='ml'?'selected':''}>ml</option>
            <option ${item?.unit==='cx'?'selected':''}>cx</option>
            <option ${item?.unit==='pct'?'selected':''}>pct</option>
            <option ${item?.unit==='frasco'?'selected':''}>frasco</option>
          </select>
        </div>
      </div>
      <label class="form-label">Observações</label>
      <textarea class="form-input" id="f-notes" placeholder="Marca preferida, tamanho..." style="min-height:60px;resize:vertical">${item ? (item.notes||'') : ''}</textarea>
      <div class="check-row">
        <label class="check-label">
          <input type="checkbox" id="f-urgent" ${item?.urgent ? 'checked' : ''} />
          🚨 Urgente
        </label>
      </div>
      <button class="save-btn" onclick="saveListForm()">${id ? '💾 Salvar alterações' : '✅ Adicionar à lista'}</button>
    `;
    renderCatPicker();
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-name').focus(), 100);
  };

  window.saveListForm = async () => {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('Digite o nome do item!'); return; }
    setSyncing(true);
    const data = {
      name, category: formCat,
      quantity: Number(document.getElementById('f-qty').value) || 1,
      unit: document.getElementById('f-unit').value,
      notes: document.getElementById('f-notes').value.trim(),
      urgent: document.getElementById('f-urgent').checked,
      done: editId ? (listItems[editId].done || false) : false,
      fromStock: editId ? (listItems[editId].fromStock || false) : false,
      stockId: editId ? (listItems[editId].stockId || null) : null,
      updatedAt: Date.now(),
    };
    if (editId) {
      await update(ref(db,'lista/'+editId), data);
      showToast('Item atualizado!');
    } else {
      data.createdAt = Date.now();
      await push(listRef, data);
      showToast('Item adicionado à lista! ✅');
    }
    setSyncing(false); closeForm();
  };

  window.toggleDone = async (id) => {
    const item = listItems[id];
    setSyncing(true);
    await update(ref(db,'lista/'+id), { done: !item.done, updatedAt: Date.now() });
    setSyncing(false);
  };

  window.deleteList = async (id) => {
    setSyncing(true);
    await remove(ref(db,'lista/'+id));
    setSyncing(false); showToast('Item removido');
  };

  window.clearDone = async () => {
    setSyncing(true);
    const promises = Object.entries(listItems).filter(([,v]) => v.done).map(([k]) => remove(ref(db,'lista/'+k)));
    await Promise.all(promises);
    setSyncing(false); showToast('Feitos removidos!');
  };

  // ── HELPERS ───────────────────────────────────────────────
  function setSyncing(v) {
    const b = document.getElementById('sync-badge');
    if (!b) return;
    b.className = v ? 'badge syncing' : 'badge online';
    b.textContent = v ? '🟡 Salvando' : '🟢 Online';
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
  function renderCatPicker() {
    const el = document.getElementById('cat-picker');
    if (!el) return;
    el.innerHTML = CATEGORIES.map(c => `
      <button class="cat-pick-btn ${formCat===c.id?'selected':''}"
        style="${formCat===c.id?`background:${c.color}33;border-color:${c.color}`:''}"
        onclick="selectCat('${c.id}')">${c.emoji} ${c.name}</button>
    `).join('');
  }
  function renderLevelPicker() {
    const el = document.getElementById('level-picker');
    if (!el) return;
    el.innerHTML = LEVELS.map(l => `
      <button class="level-pick-btn"
        style="border-color:${l.color};color:${formLevel===l.value?'#fff':l.color};background:${formLevel===l.value?l.color:'transparent'}"
        onclick="selectLevel('${l.value}')">${l.icon} ${l.label}</button>
    `).join('');
  }

  function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[0]; }
  function getLevel(v) { return LEVELS.find(l => l.value === v) || LEVELS[1]; }


  // ── CATEGORY ACTIONS ──────────────────────────────────────
  const EMOJI_OPTIONS = ['🛒','📦','🥦','🧴','🧹','💊','👕','✏️','🥫','🥤','🍖','🧀','🍞','🥛','🧃','🥚','🧁','🍎','🥕','🌿','🐟','🥩','🍝','🫙','🧂','🫒','🛁','🪥','🧻','🪴','💡','🔧','🪣','🧽','🖊️','📚','📎','🎒','👗','👟','👜','💍','🎮','🎵','🏋️','🐾','🌺','🎁','🏠','🚗','💻','📱','🎨','⚽','🏊','🧘','🌙','☀️','❄️','🔑','💰'];
  const COLOR_OPTIONS = ['#FF6B6B','#FF8CC8','#FFD43B','#FFA94D','#51CF66','#A9E34B','#63E6BE','#74C0FC','#339AF0','#B197FC','#E599F7','#CED4DA','#F06595','#FF6348','#1DD1A1','#54A0FF'];

  window.openCatForm = (id) => {
    editCatId = id;
    const cat = id ? CATEGORIES.find(c => c.id === id) : null;
    formEmoji = cat ? cat.emoji : '📦';
    formColor = cat ? cat.color : '#74C0FC';
    document.getElementById('modal-title').textContent = id ? 'Editar categoria' : 'Nova categoria';
    document.getElementById('form-body').innerHTML = `
      <label class="form-label">Nome da categoria *</label>
      <input class="form-input" id="f-catname" placeholder="Ex: Bebidas, Padaria..." value="${cat ? cat.name : ''}" />
      <label class="form-label">Emoji</label>
      <div class="emoji-grid" id="emoji-grid"></div>
      <label class="form-label">Cor</label>
      <div class="color-grid" id="color-grid"></div>
      ${cat && cat.isDefault ? '<p style="font-size:12px;color:#555;margin-top:8px">⚠️ Esta é uma categoria padrão — você pode editar nome e emoji, mas ela não pode ser excluída.</p>' : ''}
      <button class="save-btn" onclick="saveCatForm()">${id ? '💾 Salvar categoria' : '✅ Criar categoria'}</button>
    `;
    renderEmojiGrid(); renderColorGrid();
    document.getElementById('overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('f-catname').focus(), 100);
  };

  window.selectEmoji = (e) => { formEmoji = e; renderEmojiGrid(); };
  window.selectColor = (c) => { formColor = c; renderColorGrid(); };

  function renderEmojiGrid() {
    const el = document.getElementById('emoji-grid');
    if (!el) return;
    el.innerHTML = EMOJI_OPTIONS.map(e => `
      <div class="emoji-opt ${formEmoji===e?'sel':''}" onclick="selectEmoji('${e}')">${e}</div>
    `).join('');
  }
  function renderColorGrid() {
    const el = document.getElementById('color-grid');
    if (!el) return;
    el.innerHTML = COLOR_OPTIONS.map(c => `
      <div class="color-opt ${formColor===c?'sel':''}" style="background:${c}" onclick="selectColor('${c}')"></div>
    `).join('');
  }

  window.saveCatForm = async () => {
    const name = document.getElementById('f-catname').value.trim();
    if (!name) { showToast('Digite o nome da categoria!'); return; }
    setSyncing(true);
    if (editCatId) {
      const cat = CATEGORIES.find(c => c.id === editCatId);
      if (cat && cat.isDefault) {
        // Update default cat in Firebase (override)
        await update(ref(db, 'categories/' + editCatId), { name, emoji: formEmoji, color: formColor });
      } else {
        await update(ref(db, 'categories/' + editCatId), { name, emoji: formEmoji, color: formColor });
      }
      showToast('Categoria atualizada!');
    } else {
      const newId = 'cat_' + Date.now();
      await update(ref(db, 'categories/' + newId), { id: newId, name, emoji: formEmoji, color: formColor, isDefault: false, createdAt: Date.now() });
      showToast('Categoria criada! 🎉');
    }
    setSyncing(false); closeForm();
  };

  window.deleteCat = async (id) => {
    const cat = CATEGORIES.find(c => c.id === id);
    if (cat && cat.isDefault) { showToast('Categorias padrão não podem ser excluídas'); return; }
    const inUse = Object.values(stockItems).some(i => i.category === id) || Object.values(listItems).some(i => i.category === id);
    if (inUse) { showToast('Mova os itens desta categoria antes de excluir'); return; }
    setSyncing(true);
    await remove(ref(db, 'categories/' + id));
    setSyncing(false); showToast('Categoria removida');
  };

  // ── RENDER ────────────────────────────────────────────────
  function render() {
    const allStock = Object.entries(stockItems).map(([id,v]) => ({id,...v}));
    const allList  = Object.entries(listItems).map(([id,v]) => ({id,...v}));

    // Stats
    document.getElementById('stat-list').textContent  = allList.filter(i => !i.done).length;
    document.getElementById('stat-low').textContent   = allStock.filter(i => i.level === 'low').length;
    document.getElementById('stat-out').textContent   = allStock.filter(i => i.level === 'out').length;
    document.getElementById('stat-stock').textContent = allStock.length;
    document.getElementById('sync-footer').textContent = `Última sync: ${new Date().toLocaleTimeString('pt-BR')}`;

    const main = document.getElementById('main-content');
    if (currentView === 'lista')       renderLista(main, allList);
    else if (currentView === 'estoque') renderEstoque(main, allStock);
    else                                renderCategorias(main, allStock, allList);
  }

  // ── LISTA ─────────────────────────────────────────────────
  function renderLista(main, allList) {
    const filtered = allList.filter(item => {
      const matchCat    = !activeCategory || item.category === activeCategory;
      const matchSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm.toLowerCase());
      const matchFilter = activeFilter === 'all' || (activeFilter === 'done' ? item.done : !item.done);
      return matchCat && matchSearch && matchFilter;
    });
    const doneCount = allList.filter(i => i.done).length;

    let html = `
      <div class="tool-row">
        <input class="search-input" placeholder="🔍 Buscar item..." value="${searchTerm}" oninput="setSearch(this.value)" />
        <div class="filter-row">
          <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Todos</button>
          <button class="filter-btn ${activeFilter==='pending'?'active':''}" onclick="setFilter('pending')">Pendentes</button>
          <button class="filter-btn ${activeFilter==='done'?'active':''}" onclick="setFilter('done')">Feitos</button>
          ${doneCount > 0 ? `<button class="clear-btn" onclick="clearDone()">🗑 Limpar feitos</button>` : ''}
        </div>
      </div>
    `;

    if (filtered.length === 0) {
      html += `<div class="empty"><div class="empty-icon">🛒</div><p class="empty-text">Lista vazia!</p><p class="empty-hint">Toque no + para adicionar</p></div>`;
    } else {
      CATEGORIES.forEach(cat => {
        const catItems = filtered.filter(i => i.category === cat.id);
        if (!catItems.length) return;
        html += `<div class="cat-section">
          <div class="cat-header">
            <span class="cat-dot" style="background:${cat.color}"></span>
            <span class="cat-name-label">${cat.emoji} ${cat.name}</span>
            <span class="cat-count">${catItems.filter(i=>!i.done).length} restantes</span>
          </div>
          ${catItems.map(item => listCardHTML(item, cat)).join('')}
        </div>`;
      });
    }
    main.innerHTML = html;
  }

  function listCardHTML(item, cat) {
    return `<div class="card ${item.done?'done':''} ${item.fromStock?'from-stock':''}" style="border-left-color:${item.urgent&&!item.done?'#FF6B6B':cat.color}">
      <button class="check-circle ${item.done?'checked':''}" onclick="toggleDone('${item.id}')">${item.done?'✓':''}</button>
      <div class="card-body" onclick="openListForm('${item.id}')">
        <div class="card-top">
          <span class="card-name ${item.done?'done-text':''}">${item.urgent&&!item.done?'🚨 ':''}${item.name}</span>
          <span class="card-qty">${item.quantity||1} ${item.unit||'un'}</span>
        </div>
        ${item.notes ? `<p class="card-notes">${item.notes}</p>` : ''}
        <div class="card-meta">
          <span class="card-cat-label">${cat.emoji} ${cat.name}</span>
          ${item.fromStock ? `<span class="from-stock-tag">📦 do estoque</span>` : ''}
          ${item.urgent && !item.done ? `<span class="urgent-badge">Urgente</span>` : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteList('${item.id}')">✕</button>
    </div>`;
  }

  // ── ESTOQUE ───────────────────────────────────────────────
  function renderEstoque(main, allStock) {
    const filtered = allStock.filter(item => {
      const matchCat    = !activeCategory || item.category === activeCategory;
      const matchSearch = !searchTerm || item.name.toLowerCase().includes(searchTerm.toLowerCase());
      const matchFilter = activeFilter === 'all' || item.level === activeFilter;
      return matchCat && matchSearch && matchFilter;
    });

    // Alert banner for low/out
    const alerts = allStock.filter(i => i.level === 'out' || i.level === 'low');

    let html = `
      <div class="tool-row">
        <input class="search-input" placeholder="🔍 Buscar produto..." value="${searchTerm}" oninput="setSearch(this.value)" />
        <div class="filter-row">
          <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Todos</button>
          <button class="filter-btn ${activeFilter==='full'?'active':''}" onclick="setFilter('full')" style="${activeFilter==='full'?'border-color:#339AF0;color:#339AF0':''}">🔵 Cheio</button>
          <button class="filter-btn ${activeFilter==='ok'?'active':''}" onclick="setFilter('ok')" style="${activeFilter==='ok'?'border-color:#51CF66;color:#51CF66':''}">🟢 OK</button>
          <button class="filter-btn ${activeFilter==='low'?'active':''}" onclick="setFilter('low')" style="${activeFilter==='low'?'border-color:#FFD43B;color:#FFD43B':''}">🟡 Baixo</button>
          <button class="filter-btn ${activeFilter==='out'?'active':''}" onclick="setFilter('out')" style="${activeFilter==='out'?'border-color:#FF6B6B;color:#FF6B6B':''}">🔴 Zerado</button>
        </div>
      </div>
    `;

    if (alerts.length > 0 && activeFilter === 'all' && !searchTerm) {
      html += `<div class="alert-banner">
        <div class="alert-banner-title">⚠️ ${alerts.length} produto(s) precisam de atenção</div>
        ${alerts.slice(0,4).map(i => {
          const lv = getLevel(i.level);
          return `<div class="alert-item" onclick="openStockForm('${i.id}')">${lv.icon} ${i.name} — ${lv.label}</div>`;
        }).join('')}
        ${alerts.length > 4 ? `<div class="alert-item" style="color:#555">...e mais ${alerts.length-4}</div>` : ''}
      </div>`;
    }

    if (filtered.length === 0) {
      html += `<div class="empty"><div class="empty-icon">📦</div><p class="empty-text">Estoque vazio!</p><p class="empty-hint">Toque no + para cadastrar produtos</p></div>`;
    } else {
      CATEGORIES.forEach(cat => {
        const catItems = filtered.filter(i => i.category === cat.id);
        if (!catItems.length) return;
        html += `<div class="cat-section">
          <div class="cat-header">
            <span class="cat-dot" style="background:${cat.color}"></span>
            <span class="cat-name-label">${cat.emoji} ${cat.name}</span>
            <span class="cat-count">${catItems.length} produto(s)</span>
          </div>
          ${catItems.map(item => stockCardHTML(item, cat)).join('')}
        </div>`;
      });
    }
    main.innerHTML = html;
  }

  function stockCardHTML(item, cat) {
    const lv = getLevel(item.level || 'ok');
    return `<div class="stock-card level-${item.level||'ok'}">
      <div class="stock-body" onclick="openStockForm('${item.id}')">
        <div class="stock-name">${item.name}</div>
        ${item.notes ? `<p class="stock-notes">${item.notes}</p>` : ''}
        <div class="stock-meta">
          <span class="stock-cat-label">${cat.emoji} ${cat.name}</span>
          <span class="stock-qty-tag">${item.qty||0} ${item.unit||'un'}</span>
          <button class="level-badge ${item.level||'ok'}" onclick="event.stopPropagation();cycleLevel('${item.id}')">${lv.icon} ${lv.label}</button>
        </div>
      </div>
      <button class="send-btn" onclick="sendToList('${item.id}')">→ Lista</button>
      <button class="delete-btn" onclick="deleteStock('${item.id}')">✕</button>
    </div>`;
  }

  // ── CATEGORIAS ────────────────────────────────────────────
  function renderCategorias(main, allStock, allList) {
    let html = `<div class="cat-grid">`;
    CATEGORIES.forEach(cat => {
      const stockCount = allStock.filter(i => i.category === cat.id).length;
      const listCount  = allList.filter(i => i.category === cat.id && !i.done).length;
      const hasAlert   = allStock.some(i => i.category === cat.id && (i.level==='out'||i.level==='low'));
      html += `<button class="cat-card" style="border-color:${cat.color}44" onclick="setActiveCat('${cat.id}')">
        <span class="cat-card-emoji">${cat.emoji}</span>
        <span class="cat-card-name">${cat.name}</span>
        <span class="cat-card-sub">${stockCount} no estoque</span>
        ${listCount > 0 ? `<span class="cat-card-badge" style="background:${cat.color}">${listCount}</span>` : ''}
        ${hasAlert ? `<span style="position:absolute;top:8px;left:8px;font-size:13px">⚠️</span>` : ''}
      </button>`;
    });
    html += `</div>`;
    main.innerHTML = html;
  }

  // ── FIREBASE LISTENERS ────────────────────────────────────
  let stockLoaded = false, listLoaded = false;
  function checkReady() {
    if (stockLoaded && listLoaded) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      render();
    }
  }
  onValue(stockRef, snap => {
    stockItems = snap.val() || {};
    stockLoaded = true; checkReady();
    if (stockLoaded && listLoaded) render();
  });
  onValue(listRef, snap => {
    listItems = snap.val() || {};
    listLoaded = true; checkReady();
    if (stockLoaded && listLoaded) render();
  });
</script>
</body>
</html>
